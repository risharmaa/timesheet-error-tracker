<!DOCTYPE html>
<html>
    <head>
        <title>Add User</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <!--Inter Google Fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <style>
        /* Global font - EB Garamond */
        body, h1, h2, h3, h4, h5, h6, p, label, input, button, select, textarea, td, th {
            font-family: 'Inter', sans-serif;
        }
        </style>
    </head>
    <body>

        <!--Navigation bar + Flash messages-->
        <nav class="navbar navbar-expand-sm">

        <div class="container-fluid">
            <a class="navbar-brand" href="/"><img src = {{ url_for('static', filename='logo.png') }} style="width:125px;"></a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class = "btn btn-outline-secondary" href="/updatepassword">Update Password</a></li>
                <li class="nav-item"><a class="btn btn-outline-danger" href="/logout">Logout</a></li>
            </ul>
        </div>

        </nav>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <!-- Bootstrap close button to dismiss the alert -->
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <h1>Add User</h1>
        <form action="/adduser" method = "POST">
        <table>
          <tr>
            <td><label for="email">Email/Phone Number:</label></td>
            <td><input type="text" name="email" required><br></td>
          </tr>
          <tr>
            <td><label for="fname">First Name:</label></td>
            <td><input type="text" name="fname" required><br></td>
          </tr>
          <tr>
            <td><label for="lname">Last Name:</label></td>
            <td><input type="text" name="lname" required><br></td>
          </tr>
          <tr>
            <td><label for="type">Type of User:</label></td>
            <td><select name="type" id = "type" required>
                <option value="">-----</option>
                <option value="Admin">Admin</option>
                <option value="Client">Client</option>
                <option value="Caregiver">Caregiver</option>
            </select></td>
          </tr>
        </table>
      <input type="submit" name="submit">
      </form>
      <a href = "/">Home Page</a>
      <a href = "/logout">Logout</a>
      <a href = "/contactlist">Contact List</a>
    </body>
</html>
