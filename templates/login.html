<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <!--Lato Google Fonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
        <style>
        /* Global font - Inter */
        body, h1, h2, h3, h4, h5, h6, p, label, input, button, select, textarea, td, th {
            font-family: 'Lato', sans-serif;
        }
        </style>
    </head>
    <body>
      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <!-- Bootstrap close button to dismiss the alert -->
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

      <div class="container-fluid min-vh-100 d-flex flex-column">
        <div class="row flex-grow-1">
        <!-- Left Half -->
        <div class="col-md-6 d-flex align-items-center justify-content-center py-5" >
        <div class="w-100" style="max-width: 400px;">
        <img src = {{ url_for('static', filename='logo.png') }} class="d-block mx-auto img-fluid" style = "width: 250px; text-align:center">
        <h2 class="text-center mb-4">Health & Happiness Homecare LLC</h2>
        <h6 class="text-center mb-3">Timesheet Error Tracker</h6>
        </div>
        </div>
    
      <!-- Right Half -->
        <div class="col-md-6 bg-light d-flex align-items-center justify-content-center py-5">
        <div class="w-100" style="max-width: 400px;">
        <h1 class="text-center mb-4">Login</h1>
        <form action="/login" method = "POST">
          <label for="username" class="form-label">Username:</label>
          <input type="text" name="username" class="form-control"><br>
          <label for="password" class="form-label">Password:</label></td>
          <input type="password" name="password" class="form-control"><br>
          <input type="submit" name="submit" class="btn btn-primary">
        </form>
        </div>
        </div>
        </div>
      </div>
    </body>
</html>
