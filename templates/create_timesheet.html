<!DOCTYPE html>
<html>
    <head>
        <title>Create New Timesheet</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <!--Inter Google Fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <style>
        /* Global font - EB Garamond */
        body, h1, h2, h3, h4, h5, h6, p, label, input, button, select, textarea, td, th {
            font-family: 'Inter', sans-serif;
        }
        </style>
    </head>
    <body>
        <h1>Create Timesheet</h1>
        <form action="/createtimesheet" method = "POST">
        <table>
          <tr>
            <td><label for="client">Client:</label></td>
            <td><input type="text" list="client" id="client-input" name="client_id">
            <datalist id="client">
            {% for c in cl_list %}
                <option value="{{ c.userid }}" label="{{ c.fname }} {{ c.lname }}"></option>
            {% endfor %}
            </datalist>
          </td>
          </tr>
          <tr>
            <td><label for="caregiver">Caregiver:</label></td>
            <td><input type="text" list="caregiver" id="caregiver-input" name="caregiver_id">
            <datalist id="caregiver">
            {% for c in cr_list %}
                <option value="{{ c.userid }}" label="{{ c.fname }} {{ c.lname }}"></option>
            {% endfor %}
            </datalist>
          </td>
          </tr>
          <tr>
            <td><label for="date">Date:</label></td>
            <td><input type="date" name="date" required><br></td>
          </tr>
          <tr>
            <td><label for="reason">Reason:</label></td>
            <td><select name="reason" id = "reason" required>
                <option value="">-----</option>
                <option value="Out of window clock-in">Out of window clock-in</option>
                <option value="Out of window clock-out">Out of window clock-out</option>
                <option value="Clock-in is GPS out of range">Clock-in is GPS out of range</option>
                <option value="Clock-out is GPS out of range">Clock-out is GPS out of range</option>
                <option value="Missing clock-in">Missing clock-in</option>
                <option value="Missing clock-out">Missing clock-out</option>
                <option value="Tasks not noted">Tasks not noted</option>
                <option value="Not enough tasks noted">Not enough tasks noted</option>
            </select></td>
          </tr>
        </table>
      <input type="submit" name="submit">
      </form>
      <a href = "/">Home Page</a>
      <a href = "/logout">Logout</a>
      <a href = "/contactlist">Contact List</a>
      <a href = "/viewtimesheets">View All Timesheet Errors</a>
      <a href = "/">Home Page</a>
    </body>
</html>
