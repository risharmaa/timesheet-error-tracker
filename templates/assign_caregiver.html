<!DOCTYPE html>
<html>
    <head>
        <title>Assign Caregivers</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <!--Inter Google Fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <style>
        /* Global font - EB Garamond */
        body, h1, h2, h3, h4, h5, h6, p, label, input, button, select, textarea, td, th {
            font-family: 'Inter', sans-serif;
        }
        </style>
    </head>

    <body>

        <nav class="navbar navbar-expand-sm">

        <div class="container-fluid">
            <a class="navbar-brand" href="/"><img src = {{ url_for('static', filename='logo.png') }} style="width:125px;"></a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class = "btn btn-outline-secondary" href="/updatepassword">Update Password</a></li>
                <li class="nav-item"><a class="btn btn-outline-danger" href="/logout">Logout</a></li>
            </ul>
        </div>

        </nav>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <!-- Bootstrap close button to dismiss the alert -->
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <h1>Edit Caregiver Assignments for {{client.fname}} {{client.lname}}</h1>
        <form action="/addcaregiver/{{client.usernum}}" method = "GET">
        <label for="name">Add Caregiver:</label>
        <select name="add_caregiver">
            <option value = "">------</option>
            {% for c in c_list %}
                <option value="{{c.userid}}">{{c.fname}} {{c.lname}}</option>
            {% endfor %}
        </select>
        <input type="submit" name="submit">
        </form>

        <form action="/addcaregiver/{{client.usernum}}" method = "GET">
        <label for="name">Remove Caregiver:</label>
        <select name="remove_caregiver">
            <option value = "">------</option>
            {% for r in r_list %}
                <option value="{{r.userid}}">{{r.fname}} {{r.lname}}</option>
            {% endfor %}
        </select>
        <input type="submit" name="submit">
        </form>

        <a href = "/">Home Page</a>
        <a href = "/logout">Logout</a>
        <a href = "/adduser">Add User</a>
    </body>

</html>
