<!DOCTYPE html>
<html>
    <head>
        <title>Update Password</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <!--Inter Google Fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <style>
        /* Global font - EB Garamond */
        body, h1, h2, h3, h4, h5, h6, p, label, input, button, select, textarea, td, th {
            font-family: 'Inter', sans-serif;
        }
        </style>
    </head>
    <body>
      <h1>Update password for {{session.user.fname}} {{session.user.lname}}</h1>
      <form action="/updatepassword" method = "POST">
        <table>
          <tr>
            <td><label for="new">New Password:</label></td>
            <td><input type="text" name="new" required><br></td>
          </tr>
          <tr>
            <td><label for="second">Confirm Password:</label></td>
            <td><input type="text" name="second" required><br></td>
          </tr>
        </table>
      <input type="submit" name="submit">
      </form>
        <p><a href = "/logout">Logout</a></p>
        <p><a href = "/adduser">Add User</a></p>
        <p><a href = "/contactlist">View Contacts</a></p>
        <p><a href = "/createtimesheet">Create New Timesheet Error</a></p>
        <p><a href = "/viewtimesheets">View Timesheet Errors</a></p>
    </body>
</html>
