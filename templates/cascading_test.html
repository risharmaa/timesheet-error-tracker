<!DOCTYPE html>
<html>
    <head>
        <title>Create New Timesheet</title>
    </head>
    <body>
        <h1>Create Timesheet</h1>
        <form action="/createtimesheet" method = "POST">
        <table>
          <tr>
            <td><label for="client">Client:</label></td>
            <td>
            <input type="hidden" id="client-id" name="clientid">
            <input type="text" id="client-search" name="client" list="client" placeholder="Select a Client" required>
            <datalist id="client">
            {% for c in cl_list %}
                <option value="{{c.fname}} {{c.lname}}" data-id="{{c.userid}}"></option>
            {% endfor %}
            </datalist></td>
          </tr>
          <tr>
            <td><label for="caregiver">Caregiver:</label></td>
            <td><input type="hidden" id="caregiver-id" name="caregiverid">
            <input type="text" id="caregiver-search" name="caregiver" list="caregiver" placeholder="No caregivers assigned" disabled>
            <datalist id="caregiver">
            
            </datalist></td>
          </tr>
          <tr>
            <td><label for="date">Date:</label></td>
            <td><input type="date" name="date" required><br></td>
          </tr>
          <tr>
            <td><label for="reason">Reason:</label></td>
            <td><select name="reason" id = "reason" required>
                <option value="">-----</option>
                <option value="Out of window clock-in">Out of window clock-in</option>
                <option value="Out of window clock-out">Out of window clock-out</option>
                <option value="Clock-in is GPS out of range">Clock-in is GPS out of range</option>
                <option value="Clock-out is GPS out of range">Clock-out is GPS out of range</option>
                <option value="Missing clock-in">Missing clock-in</option>
                <option value="Missing clock-out">Missing clock-out</option>
                <option value="Tasks not noted">Tasks not noted</option>
                <option value="Not enough tasks noted">Not enough tasks noted</option>
            </select></td>
          </tr>
        </table>
      <input type="submit" name="submit">
      </form>
      <a href = "/">Home Page</a>
      <a href = "/logout">Logout</a>
      <a href = "/contactlist">Contact List</a>
      <a href = "/viewtimesheets">View All Timesheet Errors</a>
      <a href = "/">Home Page</a>

      <script>
        document.getElementById("client-search").addEventListener("change", function() {
        let inputValue = this.value;
        let options = document.querySelectorAll("#client option");
        let selectedId = null;

        options.forEach(option => {
            if (option.value === inputValue) {
                selectedId = option.getAttribute("data-id");
            }
        });

        // reset caregiver input every time client changes
        let caregiverInput = document.getElementById("caregiver-search");
        let caregiverList = document.getElementById("caregiver");
        caregiverInput.disabled = true;
        caregiverInput.placeholder = "Loading...";
        caregiverList.innerHTML = "";

        if (selectedId) {
            fetch(`/getcaregivers/${selectedId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        caregiverInput.disabled = true;
                        caregiverInput.placeholder = "No caregivers assigned";
                    } else {
                        caregiverInput.disabled = false;
                        caregiverInput.placeholder = "Select a Caregiver";
                        data.forEach(option => {
                            caregiverList.innerHTML += `<option value="${option.fname} ${option.lname}" data-id="${option.userid}">${option.fname} ${option.lname}</option>`;
                        });
                    }
                });
            }
        });
      </script>
    </body>
</html>
