<!DOCTYPE html>
<html>
    <head>
        <title>Confirm Timesheet Error</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <!--Inter Google Fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

        <style>
        /* Global font - EB Garamond */
        body, h1, h2, h3, h4, h5, h6, p, label, input, button, select, textarea, td, th {
            font-family: 'Inter', sans-serif;
        }
        </style>
    </head>
    <body>
        <div style="border: 1px solid #c2c2c2; background-color: #fff9e6; padding: 15px; margin: 20px 0;">
        <p>A timesheet error for <b>{{client_name.fname}} {{client_name.lname}}</b> and <b>{{caregiver_name.fname}} {{caregiver_name.lname}}</b> on <b>{{session.timesheet.date}}</b> for <b>{{reason}}</b> already exists. Would you still like to create this timesheet error?</p>
        </div>
    
        <div style="display: flex; gap: 15px;">
        <a href="/confirmtimesheet">
            <button type="button" style="background-color: green; color: white; padding: 10px 20px;">Yes</button>
        </a>

        <a href="/canceltimesheet">
            <button type="button" style="background-color: red; color: white; padding: 10px 20px;">No</button>
        </a>
        </div>
    </body>
</html>
